<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>ZEVIOUS - 종스크롤 슈팅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #eee;
  }
  h1 {
    margin: 10px 0 4px;
    letter-spacing: 8px;
    color: #7fdfff;
    text-shadow: 0 0 10px #2af;
  }
  #wrap { position: relative; }
  canvas {
    background: #06331a;
    display: block;
    border: 2px solid #333;
    box-shadow: 0 0 30px rgba(40,170,255,.25);
  }
  #help {
    margin-top: 8px;
    font-size: 13px;
    color: #9ab;
    text-align: center;
    line-height: 1.6;
  }
  kbd {
    background: #222;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 12px;
  }
</style>
</head>
<body>
<h1>ZEVIOUS</h1>
<div id="wrap"><canvas id="game" width="480" height="640"></canvas></div>
<div id="help">
  <kbd>←→↑↓</kbd> 이동 &nbsp; <kbd>Z</kbd> 재퍼(공중 적 공격) &nbsp; <kbd>X</kbd> 블래스터(지상 적 폭격) &nbsp; <kbd>Enter</kbd> 시작/재시작
</div>

<script>
'use strict';
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const W = cvs.width, H = cvs.height;

// ------------------------------------------------------------------
// 입력 처리
// ------------------------------------------------------------------
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
addEventListener('keyup', e => keys[e.code] = false);

// ------------------------------------------------------------------
// 게임 상태
// ------------------------------------------------------------------
const ST_TITLE = 0, ST_PLAY = 1, ST_OVER = 2;
let state = ST_TITLE;
let score = 0, hiScore = 0, lives = 3, stage = 1;
let frame = 0;
let scrollY = 0;          // 배경 스크롤 오프셋
const SCROLL_SPEED = 1.2;

// ------------------------------------------------------------------
// 플레이어 (솔발루)
// ------------------------------------------------------------------
const player = {
  x: W / 2, y: H - 90, w: 26, h: 26,
  speed: 4,
  alive: true,
  invincible: 0,     // 리스폰 후 무적 프레임
  zapCool: 0,        // 재퍼 쿨다운
  bombCool: 0,       // 블래스터 쿨다운
};

// 조준 사이트: 기체 앞쪽에 표시, 블래스터는 이 위치에 떨어짐
function sightPos() {
  return { x: player.x, y: player.y - 110 };
}

// ------------------------------------------------------------------
// 오브젝트 풀
// ------------------------------------------------------------------
let zappers = [];      // 플레이어 공중탄
let bombs = [];        // 플레이어 폭탄 (지상용)
let enemyShots = [];   // 적탄
let airEnemies = [];   // 공중 적
let groundEnemies = [];// 지상 적 (스크롤과 함께 이동)
let explosions = [];
let stars = [];        // 배경 장식 (강/숲 패턴 대용)

// ------------------------------------------------------------------
// 배경: 제비우스풍 녹색 대지 + 강 + 숲 타일
// ------------------------------------------------------------------
const TILE = 40;
const MAP_COLS = W / TILE;   // 12
// 의사난수 타일 생성 (row 인덱스 기반으로 결정적이라 스크롤해도 일관됨)
function tileAt(col, row) {
  const n = Math.sin(col * 127.1 + row * 311.7) * 43758.5453;
  const r = n - Math.floor(n);
  // 강: 특정 row 구간에서 사인 곡선으로 흐름
  const riverCenter = 6 + Math.sin(row * 0.15) * 3.5;
  if (Math.abs(col - riverCenter) < 1.3) return 2;          // 강
  if (r > 0.82) return 1;                                    // 숲
  if (r < 0.06) return 3;                                    // 밝은 평지
  return 0;                                                  // 기본 대지
}
const TILE_COLORS = ['#0a4a24', '#06371a', '#123f8a', '#0f5c2e'];

function drawBackground() {
  const offset = scrollY % TILE;
  const baseRow = Math.floor(scrollY / TILE);
  for (let ry = -1; ry <= H / TILE; ry++) {
    // 화면 위쪽이 앞으로 나올 지형이므로 row는 역방향으로 증가
    const row = baseRow + (H / TILE - ry);
    for (let cx = 0; cx < MAP_COLS; cx++) {
      ctx.fillStyle = TILE_COLORS[tileAt(cx, row)];
      ctx.fillRect(cx * TILE, ry * TILE + offset, TILE, TILE);
    }
  }
  // 은은한 스캔라인 느낌
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 2);
}

// ------------------------------------------------------------------
// 적 정의
// ------------------------------------------------------------------
// 공중 적 타입: toroid(지그재그), zoshi(급강하), giddo(원호 선회)
function spawnAirEnemy() {
  const t = Math.random();
  const x = 40 + Math.random() * (W - 80);
  if (t < 0.45) {
    airEnemies.push({ type: 'toroid', x, y: -20, w: 24, h: 24, hp: 1,
      vx: (Math.random() < .5 ? 1 : -1) * (1.2 + stage * .15), vy: 1.6 + stage * .1,
      phase: Math.random() * Math.PI * 2, score: 30 });
  } else if (t < 0.8) {
    airEnemies.push({ type: 'zoshi', x, y: -20, w: 26, h: 26, hp: 1,
      vx: 0, vy: 1.1, dive: false, score: 50 });
  } else {
    airEnemies.push({ type: 'giddo', x: Math.random() < .5 ? -20 : W + 20, y: 60 + Math.random() * 150,
      w: 22, h: 22, hp: 2, angle: 0, cx: x, cy: 150 + Math.random() * 100,
      r: 60 + Math.random() * 40, t: 0, score: 70 });
  }
}

// 지상 적 타입: barra(포탑, 조준 사격), logram(고정 구조물), domogram(좌우 이동 차량)
function spawnGroundEnemy() {
  const t = Math.random();
  const x = 30 + Math.random() * (W - 60);
  if (t < 0.5) {
    groundEnemies.push({ type: 'barra', x, y: -30, w: 30, h: 30, hp: 1, cool: 60 + Math.random() * 90, score: 100 });
  } else if (t < 0.8) {
    groundEnemies.push({ type: 'domogram', x, y: -30, w: 28, h: 22, hp: 1,
      vx: (Math.random() < .5 ? 1 : -1) * 0.8, cool: 90 + Math.random() * 90, score: 150 });
  } else {
    groundEnemies.push({ type: 'logram', x, y: -40, w: 40, h: 40, hp: 3, cool: 120, score: 300 });
  }
}

// ------------------------------------------------------------------
// 발사
// ------------------------------------------------------------------
function fireZapper() {
  if (player.zapCool > 0) return;
  player.zapCool = 9;
  zappers.push({ x: player.x - 7, y: player.y - 14, vy: -10 });
  zappers.push({ x: player.x + 7, y: player.y - 14, vy: -10 });
}

function fireBomb() {
  if (player.bombCool > 0 || bombs.length >= 2) return;
  player.bombCool = 24;
  const s = sightPos();
  bombs.push({ x: player.x, y: player.y - 20, tx: s.x, ty: s.y, t: 0, dur: 30 });
}

function enemyFire(x, y, speed = 2.6) {
  const dx = player.x - x, dy = player.y - y;
  const d = Math.hypot(dx, dy) || 1;
  enemyShots.push({ x, y, vx: dx / d * speed, vy: dy / d * speed });
}

// ------------------------------------------------------------------
// 폭발 이펙트
// ------------------------------------------------------------------
function boom(x, y, size = 1, ground = false) {
  explosions.push({ x, y, t: 0, dur: 24, size, ground });
}

// ------------------------------------------------------------------
// 충돌 판정 (AABB)
// ------------------------------------------------------------------
function hit(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w) / 2 && Math.abs(a.y - b.y) < (a.h + b.h) / 2;
}

// ------------------------------------------------------------------
// 게임 리셋
// ------------------------------------------------------------------
function resetGame() {
  score = 0; lives = 3; stage = 1; frame = 0; scrollY = 0;
  zappers = []; bombs = []; enemyShots = [];
  airEnemies = []; groundEnemies = []; explosions = [];
  player.x = W / 2; player.y = H - 90;
  player.alive = true; player.invincible = 120;
  state = ST_PLAY;
}

function killPlayer() {
  if (player.invincible > 0 || !player.alive) return;
  boom(player.x, player.y, 1.6);
  player.alive = false;
  lives--;
  setTimeout(() => {
    if (lives <= 0) {
      state = ST_OVER;
      hiScore = Math.max(hiScore, score);
    } else {
      player.x = W / 2; player.y = H - 90;
      player.alive = true; player.invincible = 150;
      enemyShots = [];
    }
  }, 1200);
}

// ------------------------------------------------------------------
// 업데이트
// ------------------------------------------------------------------
function update() {
  frame++;
  scrollY += SCROLL_SPEED;

  // 스테이지 상승: 1000점마다
  stage = 1 + Math.floor(score / 1000);

  // --- 플레이어 이동 ---
  if (player.alive) {
    if (keys.ArrowLeft)  player.x -= player.speed;
    if (keys.ArrowRight) player.x += player.speed;
    if (keys.ArrowUp)    player.y -= player.speed;
    if (keys.ArrowDown)  player.y += player.speed;
    player.x = Math.max(16, Math.min(W - 16, player.x));
    player.y = Math.max(H * 0.35, Math.min(H - 30, player.y));

    if (keys.KeyZ) fireZapper();
    if (keys.KeyX) fireBomb();
  }
  if (player.zapCool > 0) player.zapCool--;
  if (player.bombCool > 0) player.bombCool--;
  if (player.invincible > 0) player.invincible--;

  // --- 적 스폰 ---
  const airRate = Math.max(20, 55 - stage * 4);
  const groundRate = Math.max(60, 130 - stage * 8);
  if (frame % Math.floor(airRate) === 0) spawnAirEnemy();
  if (frame % Math.floor(groundRate) === 0) spawnGroundEnemy();

  // --- 재퍼 이동 ---
  for (const z of zappers) z.y += z.vy;
  zappers = zappers.filter(z => z.y > -20);

  // --- 폭탄 이동 (포물선처럼 목표 지점까지 보간) ---
  for (const b of bombs) {
    b.t++;
    const p = b.t / b.dur;
    b.x = b.x + (b.tx - b.x) * 0.18;
    b.y = b.y + (b.ty - b.y) * 0.18;
    if (b.t >= b.dur) {
      b.done = true;
      boom(b.tx, b.ty, 1.3, true);
      // 폭발 반경 내 지상 적 피해
      for (const g of groundEnemies) {
        if (Math.hypot(g.x - b.tx, g.y - b.ty) < 45) {
          g.hp--;
          if (g.hp <= 0) { g.dead = true; score += g.score; boom(g.x, g.y, 1.2, true); }
        }
      }
    }
  }
  bombs = bombs.filter(b => !b.done);

  // --- 공중 적 이동 ---
  for (const e of airEnemies) {
    if (e.type === 'toroid') {
      e.phase += 0.08;
      e.x += Math.sin(e.phase) * 2.4 + e.vx * 0.3;
      e.y += e.vy;
    } else if (e.type === 'zoshi') {
      e.y += e.vy;
      if (!e.dive && e.y > 120 && Math.abs(e.x - player.x) < 60) {
        e.dive = true;
        e.vy = 4.5 + stage * 0.3;
        e.vx = (player.x - e.x) / 90;
        if (Math.random() < 0.6) enemyFire(e.x, e.y);
      }
      e.x += e.vx;
    } else if (e.type === 'giddo') {
      e.t += 0.035;
      e.x = e.cx + Math.cos(e.t * 2) * e.r;
      e.y = e.cy + Math.sin(e.t * 2) * e.r * 0.6 + e.t * 18;
      if (frame % 100 === 0 && e.y > 0 && e.y < H - 200) enemyFire(e.x, e.y, 2.2);
    }
  }
  airEnemies = airEnemies.filter(e => !e.dead && e.y < H + 40 && e.x > -60 && e.x < W + 60);

  // --- 지상 적: 스크롤과 함께 아래로 이동 ---
  for (const g of groundEnemies) {
    g.y += SCROLL_SPEED;
    if (g.type === 'domogram') {
      g.x += g.vx;
      if (g.x < 20 || g.x > W - 20) g.vx *= -1;
    }
    // 사격
    if (g.y > 40 && g.y < H - 120) {
      g.cool--;
      if (g.cool <= 0) {
        enemyFire(g.x, g.y, g.type === 'logram' ? 2.0 : 2.5 + stage * 0.1);
        g.cool = (g.type === 'logram' ? 70 : 110) - stage * 4 + Math.random() * 50;
      }
    }
  }
  groundEnemies = groundEnemies.filter(g => !g.dead && g.y < H + 50);

  // --- 적탄 이동 ---
  for (const s of enemyShots) { s.x += s.vx; s.y += s.vy; }
  enemyShots = enemyShots.filter(s => s.x > -10 && s.x < W + 10 && s.y > -10 && s.y < H + 10);

  // --- 충돌: 재퍼 vs 공중 적 ---
  for (const z of zappers) {
    for (const e of airEnemies) {
      if (!e.dead && hit({ x: z.x, y: z.y, w: 6, h: 14 }, e)) {
        z.dead = true;
        e.hp--;
        if (e.hp <= 0) { e.dead = true; score += e.score; boom(e.x, e.y); }
        break;
      }
    }
  }
  zappers = zappers.filter(z => !z.dead);

  // --- 충돌: 플레이어 vs 적탄 / 공중 적 ---
  if (player.alive && player.invincible <= 0) {
    const pbox = { x: player.x, y: player.y, w: 16, h: 16 };
    for (const s of enemyShots) {
      if (hit(pbox, { x: s.x, y: s.y, w: 8, h: 8 })) { s.dead = true; killPlayer(); break; }
    }
    if (player.alive) {
      for (const e of airEnemies) {
        if (!e.dead && hit(pbox, e)) { e.dead = true; boom(e.x, e.y); killPlayer(); break; }
      }
    }
    enemyShots = enemyShots.filter(s => !s.dead);
  }

  // --- 폭발 업데이트 ---
  for (const ex of explosions) ex.t++;
  explosions = explosions.filter(ex => ex.t < ex.dur);
}

// ------------------------------------------------------------------
// 그리기
// ------------------------------------------------------------------
function drawPlayer() {
  if (!player.alive) return;
  // 리스폰 무적 중 깜빡임
  if (player.invincible > 0 && Math.floor(frame / 4) % 2 === 0) return;
  const { x, y } = player;
  ctx.save();
  ctx.translate(x, y);
  // 기체 (은색 솔발루풍)
  ctx.fillStyle = '#d8dde4';
  ctx.beginPath();
  ctx.moveTo(0, -14);
  ctx.lineTo(5, -2);
  ctx.lineTo(13, 8);
  ctx.lineTo(4, 10);
  ctx.lineTo(0, 6);
  ctx.lineTo(-4, 10);
  ctx.lineTo(-13, 8);
  ctx.lineTo(-5, -2);
  ctx.closePath();
  ctx.fill();
  // 콕핏
  ctx.fillStyle = '#e33';
  ctx.fillRect(-2, -8, 4, 8);
  // 엔진 불꽃
  ctx.fillStyle = frame % 6 < 3 ? '#fc3' : '#f83';
  ctx.beginPath();
  ctx.moveTo(-3, 11); ctx.lineTo(0, 17 + Math.random() * 3); ctx.lineTo(3, 11);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // 조준 사이트 (블래스터 낙하 지점)
  const s = sightPos();
  ctx.strokeStyle = 'rgba(255,80,80,0.9)';
  ctx.lineWidth = 2;
  ctx.strokeRect(s.x - 8, s.y - 8, 16, 16);
  ctx.beginPath();
  ctx.moveTo(s.x - 12, s.y); ctx.lineTo(s.x - 4, s.y);
  ctx.moveTo(s.x + 4, s.y);  ctx.lineTo(s.x + 12, s.y);
  ctx.moveTo(s.x, s.y - 12); ctx.lineTo(s.x, s.y - 4);
  ctx.moveTo(s.x, s.y + 4);  ctx.lineTo(s.x, s.y + 12);
  ctx.stroke();
}

function drawEnemies() {
  // 지상 적 (배경 위, 공중 적 아래)
  for (const g of groundEnemies) {
    ctx.save();
    ctx.translate(g.x, g.y);
    if (g.type === 'barra') {
      ctx.fillStyle = '#555c66';
      ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#8892a0';
      ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
      // 포신: 플레이어 방향
      const a = Math.atan2(player.y - g.y, player.x - g.x);
      ctx.strokeStyle = '#333'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a) * 16, Math.sin(a) * 16); ctx.stroke();
    } else if (g.type === 'domogram') {
      ctx.fillStyle = '#6b5530';
      ctx.fillRect(-14, -9, 28, 18);
      ctx.fillStyle = '#93794a';
      ctx.fillRect(-9, -5, 18, 10);
      ctx.fillStyle = '#332';
      ctx.fillRect(-14, -11, 28, 3); ctx.fillRect(-14, 8, 28, 3);
    } else { // logram
      ctx.fillStyle = '#4a4f58';
      ctx.fillRect(-20, -20, 40, 40);
      ctx.fillStyle = '#6d7480';
      ctx.fillRect(-13, -13, 26, 26);
      ctx.fillStyle = frame % 30 < 15 ? '#f55' : '#a33';
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  // 공중 적
  for (const e of airEnemies) {
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.type === 'toroid') {
      // 회색 도넛 (토로이드)
      ctx.strokeStyle = '#c8ccd4'; ctx.lineWidth = 6;
      ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = '#7a828e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.stroke();
    } else if (e.type === 'zoshi') {
      // 붉은 화살촉
      ctx.fillStyle = e.dive ? '#f44' : '#c33';
      ctx.beginPath();
      ctx.moveTo(0, 13); ctx.lineTo(11, -9); ctx.lineTo(0, -3); ctx.lineTo(-11, -9);
      ctx.closePath(); ctx.fill();
    } else { // giddo
      ctx.fillStyle = '#3ad';
      ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#8ef';
      ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawShots() {
  // 재퍼
  ctx.fillStyle = '#aef';
  for (const z of zappers) ctx.fillRect(z.x - 2, z.y - 8, 4, 14);
  // 폭탄
  for (const b of bombs) {
    ctx.fillStyle = '#fd5';
    ctx.beginPath(); ctx.arc(b.x, b.y, 5 - b.t / b.dur * 2, 0, Math.PI * 2); ctx.fill();
  }
  // 적탄
  for (const s of enemyShots) {
    ctx.fillStyle = frame % 8 < 4 ? '#fff' : '#f66';
    ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, Math.PI * 2); ctx.fill();
  }
}

function drawExplosions() {
  for (const ex of explosions) {
    const p = ex.t / ex.dur;
    const r = (6 + p * 26) * ex.size;
    ctx.globalAlpha = 1 - p;
    ctx.fillStyle = ex.ground ? '#f93' : '#fc4';
    ctx.beginPath(); ctx.arc(ex.x, ex.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex.x, ex.y, r * 0.45, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, 28);
  ctx.fillStyle = '#fff';
  ctx.font = '14px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + String(score).padStart(7, '0'), 10, 19);
  ctx.textAlign = 'center';
  ctx.fillText('HI ' + String(Math.max(hiScore, score)).padStart(7, '0'), W / 2, 19);
  ctx.textAlign = 'right';
  ctx.fillText('STAGE ' + stage, W - 10, 19);
  // 잔기 표시
  ctx.fillStyle = '#d8dde4';
  for (let i = 0; i < lives - 1; i++) {
    const lx = 14 + i * 20, ly = H - 14;
    ctx.beginPath();
    ctx.moveTo(lx, ly - 7); ctx.lineTo(lx + 7, ly + 5); ctx.lineTo(lx - 7, ly + 5);
    ctx.closePath(); ctx.fill();
  }
}

function drawCenterText(main, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#7fdfff';
  ctx.font = 'bold 42px "Courier New", monospace';
  ctx.fillText(main, W / 2, H / 2 - 30);
  ctx.fillStyle = '#fff';
  ctx.font = '16px "Courier New", monospace';
  ctx.fillText(sub, W / 2, H / 2 + 20);
  if (frame % 60 < 40) {
    ctx.fillStyle = '#fd5';
    ctx.fillText('PRESS ENTER', W / 2, H / 2 + 60);
  }
}

// ------------------------------------------------------------------
// 메인 루프
// ------------------------------------------------------------------
function loop() {
  frame++;
  if (state === ST_PLAY) {
    frame--;           // update()에서 frame++ 하므로 중복 방지
    update();
  }

  drawBackground();

  if (state === ST_TITLE) {
    drawCenterText('ZEVIOUS', 'Z: 재퍼 (공중)   X: 블래스터 (지상)');
    if (keys.Enter) resetGame();
  } else if (state === ST_PLAY) {
    drawEnemies();
    drawShots();
    drawPlayer();
    drawExplosions();
    drawHUD();
  } else if (state === ST_OVER) {
    drawEnemies();
    drawExplosions();
    drawHUD();
    drawCenterText('GAME OVER', 'SCORE ' + score + '   HI ' + hiScore);
    if (keys.Enter) resetGame();
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
